<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Super · Lista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spline+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F5F2;
    --card:#FFFFFF;
    --ink:#111812;
    --ink2:#3A4439;
    --muted:#8A9689;
    --line:#E4E7E0;
    --line2:#EDEEE9;
    --verde:#1A7A47;
    --verde-mid:#22935A;
    --verde-suave:#D8F0E6;
    --verde-ring:#9ACFB5;
    --azul:#1450A0;
    --azul-suave:#DDE9FA;
    --rojo:#A82424;
    --rojo-suave:#F8E8E8;
    --mono:'Spline Sans Mono',monospace;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{overscroll-behavior-x:none}
  body{
    font-family:'Schibsted Grotesk',sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;
    min-height:100dvh;padding-bottom:130px;
    overscroll-behavior-y:contain;
  }

  /* ══ HEADER ══════════════════════════════════════════ */
  .top-sticky{
    position:sticky;top:0;z-index:20;
    background:#fff;
    border-bottom:1.5px solid var(--line);
    box-shadow:0 2px 12px rgba(0,0,0,.06);
    padding-top:env(safe-area-inset-top);
  }
  /* Una sola fila: título + total + progreso */
  .hd-inner{
    padding:10px 14px 8px;
    display:flex;align-items:center;gap:10px;
  }
  h1{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);flex:none}
  .hd-total{display:flex;align-items:baseline;gap:5px;flex:1}
  .hd-total .lbl{display:none} /* se omite el label "Total" para ganar espacio */
  .hd-total strong{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
  .progreso{
    font-family:var(--mono);font-size:11px;font-weight:600;
    background:var(--verde-suave);color:var(--verde);
    padding:3px 10px;border-radius:20px;letter-spacing:.04em;flex:none;
  }

  /* ── Buscador más compacto ── */
  .search-wrap{padding:0 12px 8px}
  .search-box{
    display:flex;align-items:center;gap:7px;
    background:var(--bg);border:1.5px solid var(--line);
    border-radius:9px;padding:7px 11px;
    transition:border-color .15s,box-shadow .15s;
  }
  .search-box:focus-within{border-color:var(--verde-mid);background:#fff;box-shadow:0 0 0 3px var(--verde-suave)}
  .search-icon{color:var(--muted);font-size:14px;flex:none}
  #inpBuscar{
    border:none;background:transparent;font:inherit;font-size:15px;
    color:var(--ink);flex:1;outline:none;min-width:0;
  }
  #inpBuscar::placeholder{color:var(--muted)}
  .search-clear{
    flex:none;border:none;background:transparent;
    color:var(--muted);font-size:15px;cursor:pointer;padding:0 2px;display:none;
  }
  .search-clear.visible{display:block}

  /* ── Franja de pendientes (arriba) ── */
  .pending-bar{
    border-top:1.5px solid var(--line);
    padding:8px 14px 9px;
    display:none; /* se muestra solo si hay pendientes */
  }
  .pending-bar.visible{display:block}
  .pending-label{
    font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px;
  }
  .pending-pills{display:flex;flex-wrap:wrap;gap:6px}
  .pending-pill{
    flex:none;font-family:inherit;font-size:11px;font-weight:700;
    letter-spacing:.07em;text-transform:uppercase;
    padding:5px 13px;border-radius:20px;border:1.5px solid transparent;
    cursor:pointer;white-space:nowrap;
    background:var(--verde-suave);color:var(--verde);border-color:var(--verde-ring);
    display:flex;align-items:center;gap:6px;
    transition:opacity .12s,transform .1s;
  }
  .pending-pill:active{opacity:.75;transform:scale(.96)}
  .pending-pill .badge{
    background:var(--verde);color:#fff;
    border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;
  }

  /* ── Carrusel de todas las categorías: ver .all-cats-inner en sección ALTA ── */
  .cat-btn{
    flex:none;font-family:inherit;font-size:11px;font-weight:700;
    letter-spacing:.07em;text-transform:uppercase;
    padding:5px 13px;border-radius:20px;border:1.5px solid transparent;
    cursor:pointer;white-space:nowrap;min-height:30px;
    transition:opacity .12s,transform .1s,box-shadow .12s;
  }
  .cat-btn:active{opacity:.75;transform:scale(.96)}
  .cat-btn.activa{box-shadow:0 0 0 2px var(--ink)}

  /* ══ MAIN ═══════════════════════════════════════════ */
  main{padding:16px 14px 0}
  .no-resultados{text-align:center;padding:40px 20px;font-size:14px;color:var(--muted)}

  .categoria{margin-bottom:22px}
  .cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
  .cat-pill{
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:4px 12px;border-radius:20px;border:1.5px solid transparent;
  }
  .cat-n{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto}

  .grupo{
    background:var(--card);border-radius:var(--r);overflow:hidden;
    border:1.5px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04);
  }

  /* ── Items ── */
  .item{
    display:flex;flex-direction:column;
    padding:12px 12px 10px;border-bottom:1.5px solid var(--line2);
    gap:7px;transition:background .1s;
  }
  .item:last-child{border-bottom:none}
  .item.catalogo{background:var(--card)}
  .item.catalogo .nombre{color:var(--ink2);font-weight:500}
  .item.pendiente{background:#FAFCF8}
  .item.ok{background:#F5FBF7}
  .item.ok .nombre{
    color:var(--muted);text-decoration:line-through;
    text-decoration-thickness:1.5px;text-decoration-color:var(--verde-ring);font-weight:400;
  }

  .item-top{display:flex;align-items:flex-start;gap:9px}
  .item-bottom{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-left:41px}

  .check{
    flex:none;width:30px;height:30px;border-radius:50%;
    border:2px solid var(--line);background:transparent;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;color:transparent;cursor:pointer;margin-top:2px;
    -webkit-tap-highlight-color:transparent;
    transition:all .18s cubic-bezier(.4,0,.2,1);
  }
  .item.pendiente .check{border-color:var(--verde-ring)}
  .item.ok .check{background:var(--verde);border-color:var(--verde);color:#fff;box-shadow:0 2px 8px rgba(26,122,71,.25)}

  .info{flex:1;min-width:0}
  .nombre-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .nombre{font-size:15px;font-weight:600;line-height:1.3;word-break:break-word}
  .precio-ref{
    font-family:var(--mono);font-size:11px;font-weight:600;
    color:var(--muted);background:var(--line2);
    padding:2px 7px;border-radius:6px;white-space:nowrap;
  }
  .sub{display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap}
  .cat-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
  .cat-lbl.vacia{color:#C4CAC2;font-style:italic;text-transform:none;letter-spacing:0}

  .info-actions{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .btn-inline{
    font-family:inherit;font-size:11px;font-weight:600;
    color:var(--muted);background:transparent;
    border:1px dashed var(--line);border-radius:6px;
    padding:3px 9px;cursor:pointer;transition:all .12s;white-space:nowrap;
  }
  .btn-inline:active{background:var(--line2);color:var(--ink)}

  .chip-lista{
    flex:none;font-family:var(--mono);font-size:11px;font-weight:600;
    color:var(--azul);background:var(--azul-suave);
    padding:3px 8px;border-radius:6px;white-space:nowrap;
  }
  .chip-fecha{
    flex:none;font-family:var(--mono);font-size:11px;font-weight:600;
    color:var(--verde);background:var(--verde-suave);
    padding:3px 8px;border-radius:6px;white-space:nowrap;
  }

  .valor{
    flex:none;width:96px;font-family:var(--mono);font-size:16px;text-align:right;
    border:1.5px solid var(--line);border-radius:8px;
    padding:6px 8px;background:var(--bg);color:var(--ink);
    transition:border-color .15s,box-shadow .15s;
  }
  .valor:focus{outline:none;border-color:var(--verde-mid);background:#fff;box-shadow:0 0 0 3px var(--verde-suave)}
  .valor.historico{color:var(--muted);background:transparent;border-style:dashed;border-color:var(--line)}

  .btn-comprar{
    flex:none;font:inherit;font-size:11px;font-weight:700;
    color:var(--verde);background:var(--verde-suave);
    border:1.5px solid var(--verde-ring);border-radius:8px;
    padding:7px 12px;cursor:pointer;letter-spacing:.05em;
    text-transform:uppercase;white-space:nowrap;min-height:34px;
    transition:background .12s;
  }
  .btn-comprar:active{background:var(--verde-ring);color:#fff}

  .btn-sacar{
    flex:none;width:34px;height:34px;border-radius:50%;
    border:none;background:transparent;color:var(--muted);
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .12s;
  }
  .btn-sacar:active{background:var(--line)}

  .btn-eliminar{
    flex:none;width:34px;height:34px;border-radius:50%;
    border:none;background:transparent;color:#D4CCCC;
    font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .12s,color .12s;
  }
  .btn-eliminar:active{background:var(--rojo-suave);color:var(--rojo)}

  /* ══ ALTA ════════════════════════════════════════════ */
  .alta{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:var(--card);border-top:1.5px solid var(--line);
    padding:8px 12px calc(8px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:7px;
    box-shadow:0 -4px 20px rgba(0,0,0,.06);
  }
  .alta-inputs{display:flex;gap:7px;align-items:center}
  .alta input{
    font-family:inherit;font-size:16px;
    border:1.5px solid var(--line);border-radius:10px;
    padding:10px 12px;background:var(--bg);color:var(--ink);
    min-width:0;transition:border-color .15s,box-shadow .15s;
  }
  .alta input:focus{outline:none;border-color:var(--verde-mid);background:#fff;box-shadow:0 0 0 3px var(--verde-suave)}
  #inpProducto{flex:1.4}
  #inpCategoria{flex:1}
  .btn-add{
    flex:none;width:44px;height:44px;border:none;border-radius:10px;
    background:var(--verde);color:#fff;font-size:25px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 10px rgba(26,122,71,.3);transition:background .12s;
    -webkit-appearance:none;appearance:none;
  }
  .btn-add:active{background:var(--verde-mid)}
  .btn-add:disabled{opacity:.4;box-shadow:none}

  /* Carrusel de categorías dentro de la barra de alta */
  .all-cats-inner{
    display:flex;gap:6px;
    overflow-x:auto;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    padding-bottom:1px;
  }
  .all-cats-inner::-webkit-scrollbar{display:none}

  .estado-app{text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted);padding:24px 0}

  /* ══ MODALES ════════════════════════════════════════ */
  .modal,.modal-confirm{
    position:fixed;inset:0;z-index:40;
    background:rgba(0,0,0,.4);
    display:flex;align-items:flex-end;justify-content:center;
    padding:16px;backdrop-filter:blur(4px);
  }
  .modal-confirm{z-index:50}
  .modal[hidden],.modal-confirm[hidden]{display:none}
  .modal-card,.modal-confirm .card{
    background:var(--card);border-radius:18px;
    width:100%;max-width:480px;padding:20px;
    box-shadow:0 12px 40px rgba(0,0,0,.15);
  }
  .m-tag{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
  .m-nombre{font-size:18px;font-weight:700;margin-bottom:14px}
  .modal-card input{
    width:100%;font-family:inherit;font-size:16px;
    border:1.5px solid var(--line);border-radius:10px;
    padding:13px;background:var(--bg);color:var(--ink);
    margin-bottom:14px;transition:border-color .15s,box-shadow .15s;
  }
  .modal-card input:focus{outline:none;border-color:var(--verde-mid);background:#fff;box-shadow:0 0 0 3px var(--verde-suave)}
  .m-btns{display:flex;gap:8px}
  .m-btns button{
    flex:1;padding:13px;border-radius:11px;border:1.5px solid var(--line);
    background:transparent;color:var(--ink);font:inherit;font-size:15px;font-weight:500;cursor:pointer;
    transition:background .12s;
  }
  .m-btns button:active{background:var(--line2)}
  .primario{background:var(--verde) !important;color:#fff !important;border-color:var(--verde) !important}
  .primario:active{background:var(--verde-mid) !important}
  .modal-confirm .aviso{font-size:10px;font-weight:700;color:var(--rojo);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
  .modal-confirm .item-nombre{font-size:18px;font-weight:700;margin-bottom:5px}
  .modal-confirm .item-warn{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.55}
  .peligro{background:var(--rojo) !important;color:#fff !important;border-color:var(--rojo) !important}
  .peligro:active{background:#8A1A1A !important}
</style>
</head>
<body>

<div class="top-sticky">
  <div class="hd-inner">
    <h1>Super</h1>
    <div class="hd-total">
      <span class="lbl">Total</span>
      <strong id="total">$ 0</strong>
    </div>
    <div class="progreso" id="progreso">— / —</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="inpBuscar" type="search" placeholder="Buscar producto…" autocomplete="off" autocorrect="off">
      <button class="search-clear" id="btnSearchClear">✕</button>
    </div>
  </div>

  <!-- Categorías con pendientes -->
  <div class="pending-bar" id="pendingBar">
    <div class="pending-label">Pendientes de compra</div>
    <div class="pending-pills" id="pendingPills"></div>
  </div>
</div>

<main id="lista"></main>
<div class="estado-app" id="estadoApp">Cargando…</div>

<!-- Modal confirmar eliminar -->
<div class="modal-confirm" id="modalConfirm" hidden>
  <div class="card">
    <div class="aviso">Eliminar producto</div>
    <div class="item-nombre" id="confirmNombre"></div>
    <div class="item-warn">Se borrará de la lista y del sheet permanentemente.</div>
    <div class="acciones m-btns">
      <button id="confirmCancelar">Cancelar</button>
      <button id="confirmEliminar" class="peligro">Eliminar</button>
    </div>
  </div>
</div>

<!-- Modal editar categoría -->
<div class="modal" id="modal" hidden>
  <div class="modal-card">
    <div class="m-tag">Categoría</div>
    <div class="m-nombre" id="modalProducto"></div>
    <input id="modalInput" list="cats" placeholder="Elegí existente o escribí nueva" autocomplete="off">
    <div class="m-btns">
      <button id="modalCancelar">Cancelar</button>
      <button id="modalGuardar" class="primario">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal editar nombre -->
<div class="modal" id="modalNombre" hidden>
  <div class="modal-card">
    <div class="m-tag">Editar nombre</div>
    <div class="m-nombre" id="modalNombreActual"></div>
    <input id="modalNombreInput" type="text" placeholder="Nuevo nombre" autocomplete="off">
    <div class="m-btns">
      <button id="modalNombreCancelar">Cancelar</button>
      <button id="modalNombreGuardar" class="primario">Guardar</button>
    </div>
  </div>
</div>

<div class="alta">
  <div class="alta-inputs">
    <input id="inpProducto" type="text" placeholder="Producto" autocomplete="off">
    <input id="inpCategoria" type="text" placeholder="Categoría" list="cats" autocomplete="off">
    <datalist id="cats"></datalist>
    <button type="button" class="btn-add" id="btnAdd" aria-label="Agregar">+</button>
  </div>
  <!-- Carrusel de todas las categorías debajo del crear -->
  <div class="all-cats-inner" id="catBarInner"></div>
</div>
